<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" role="img" aria-label="Kamronbek Juraev — React Native and Expo engineer, Tashkent, 6+ years, 20+ apps shipped to the App Store and Google Play">
  <title>Kamronbek Juraev — React Native / Expo engineer</title>
  <style>
    :root {
      --bg: #070a12;
      --chrome: #0e1524;
      --fg: #e9eef7;
      --muted: #8a94a8;
      --accent: #ff8f3a;
      --stroke: #1b2436;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --chrome: #f3f4f6;
        --fg: #1f2328;
        --muted: #59636e;
        --accent: #b8500f;
        --stroke: #d1d9e0;
      }
    }
    text {
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }
    .fg { fill: var(--fg); }
    .mu { fill: var(--muted); }
    .ac { fill: var(--accent); }

    /* Finished state is the DEFAULT; `backwards` fill hides each row during its
       delay only while the animation is actually running. A renderer that skips
       animations shows the completed card instead of a blank one. */
    .row {
      animation: rise .5s cubic-bezier(.22,.61,.36,1) backwards;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .d1 { animation-delay: 1.30s; }
    .d2 { animation-delay: 1.95s; }
    .d3 { animation-delay: 2.30s; }
    .d4 { animation-delay: 2.65s; }
    .d5 { animation-delay: 3.00s; }
    .d6 { animation-delay: 3.35s; }

    .rule {
      stroke: var(--accent);
      stroke-width: 2;
      stroke-dasharray: 820;
      stroke-dashoffset: 0;
      animation: draw 1.1s cubic-bezier(.22,.61,.36,1) 1.45s backwards;
    }
    @keyframes draw {
      from { stroke-dashoffset: 820; }
      to   { stroke-dashoffset: 0; }
    }

    .caret { fill: var(--accent); animation: blink 1.15s steps(1) infinite; }
    @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }

    /* If the reader has animations disabled, show the finished state rather than a blank card. */
    @media (prefers-reduced-motion: reduce) {
      .row  { opacity: 1; animation: none; }
      .rule { stroke-dashoffset: 0; animation: none; }
      .caret { animation: none; }
      .type-mask { clip-path: none; }
      .cmd-caret { display: none; }
    }
  </style>

  <defs>
    <clipPath id="type">
      <!-- width defaults to fully-revealed; SMIL types it in from 0 when supported. -->
      <rect x="30" y="62" width="112" height="34">
        <animate attributeName="width" dur="0.62s" begin="0.45s" fill="freeze" calcMode="discrete"
                 values="0;16;32;48;64;80;96;112" keyTimes="0;0.14;0.28;0.42;0.56;0.70;0.85;1"/>
      </rect>
    </clipPath>
  </defs>

  <!-- window -->
  <rect x="0" y="0" width="900" height="320" rx="12" fill="var(--bg)"/>
  <path d="M0 12 A12 12 0 0 1 12 0 H888 A12 12 0 0 1 900 12 V38 H0 Z" fill="var(--chrome)"/>
  <line x1="0" y1="38" x2="900" y2="38" stroke="var(--stroke)" stroke-width="1"/>
  <rect x="0.5" y="0.5" width="899" height="319" rx="12" fill="none" stroke="var(--stroke)" stroke-width="1"/>
  <circle cx="24" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="19" r="6" fill="#febc2e"/>
  <circle cx="64" cy="19" r="6" fill="#28c840"/>
  <text x="450" y="24" class="mu" font-size="12" text-anchor="middle">kamronbek@tashkent — ~/ship</text>

  <!-- prompt + typed command -->
  <text x="30" y="88" font-size="17"><tspan class="ac">❯</tspan></text>
  <g class="type-mask" clip-path="url(#type)">
    <text x="52" y="88" class="fg" font-size="17">whoami</text>
  </g>
  <rect class="cmd-caret" x="142" y="74" width="9" height="18" fill="var(--accent)">
    <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.72;1" dur="1.2s" begin="0s" fill="freeze"/>
  </rect>

  <!-- name -->
  <text x="30" y="130" class="fg row d1" font-size="27" font-weight="700">Kamronbek Juraev</text>
  <line class="rule" x1="30" y1="150" x2="850" y2="150"/>

  <!-- facts -->
  <text x="30" y="190" class="row d2" font-size="15"><tspan class="mu">role  </tspan><tspan class="fg">React Native / Expo engineer · 6+ years</tspan></text>
  <text x="30" y="217" class="row d3" font-size="15"><tspan class="mu">ships </tspan><tspan class="fg">20+ apps live on the App Store &amp; Google Play</tspan></text>
  <text x="30" y="244" class="row d4" font-size="15"><tspan class="mu">where </tspan><tspan class="fg">Tashkent · UTC+5 · full working-day overlap with EU</tspan></text>
  <text x="30" y="271" class="row d5" font-size="15"><tspan class="mu">craft </tspan><tspan class="fg">60fps lists · offline state · 200ms transitions</tspan></text>

  <!-- trailing prompt -->
  <text x="30" y="302" class="row d6" font-size="17"><tspan class="ac">❯</tspan></text>
  <rect class="row d6 caret" x="52" y="288" width="9" height="18"/>
</svg>
