<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460" role="img" aria-label="Kamronbek Juraev, React Native and Expo engineer. An animated phone cold-starting an app, loading a list of shipped apps — Netevia, WorkAxle, Swish, DriveMe — and opening one of them.">
  <title>Kamronbek Juraev — React Native / Expo engineer</title>
  <defs>
    <clipPath id="screen"><rect x="60" y="56" width="208" height="348" rx="20"/></clipPath>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "DejaVu Sans Mono", monospace; }

    .name    { font-size: 30px; font-weight: 700; fill: #1f2328; }
    .role    { font-size: 17px; fill: #b8500f; font-weight: 600; }
    .blurb   { font-size: 15px; fill: #59636e; }
    .rowName { font-size: 14px; font-weight: 600; fill: #1f2328; }
    .rowSub  { font-size: 11px; fill: #59636e; }
    .dTitle  { font-size: 17px; font-weight: 700; fill: #1f2328; }
    .backLink{ font-size: 13px; fill: #b8500f; font-weight: 600; }
    .cta     { font-size: 13px; font-weight: 700; fill: #ffffff; }
    .chipText{ font-size: 12px; fill: #59636e; font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "DejaVu Sans Mono", monospace; }
    .hdr     { font-size: 16px; font-weight: 700; fill: #1f2328; }

    /* One duration for everything, so nothing can drift out of sync. */
    .splash, .skel, .detail, .ripple, .bar, .listGroup { animation-duration: 9s; animation-iteration-count: infinite; animation-timing-function: linear; }

    /* 0-7% icon springs in, holds, then hands off to the list at ~15% */
    .splash { animation-name: splash; transform-origin: 164px 230px; }
    @keyframes splash {
      0%   { opacity: 0; transform: scale(.4); }
      7%   { opacity: 1; transform: scale(1); }
      13%  { opacity: 1; transform: scale(1); }
      17%  { opacity: 0; transform: scale(1.25); }
      100% { opacity: 0; transform: scale(1.25); }
    }

    /* skeletons cover the gap between splash and real content */
    .skel { animation-name: skel; }
    @keyframes skel {
      0%, 14%   { opacity: 0; }
      16%, 24%  { opacity: 1; }
      28%, 100% { opacity: 0; }
    }
    .s0 { animation-delay: 0s; }
    .s1 { animation-delay: .06s; }
    .s2 { animation-delay: .12s; }
    .s3 { animation-delay: .18s; }

    /* Real rows slide up into place, one after another.
       Written as the animation shorthand rather than longhands: the stagger
       is baked into each row's own keyframes instead of an animation-delay, so
       nothing depends on how delay and duration cascade together. */
    @keyframes rowIn0 { 0%,25% { opacity:0; transform:translateY(10px); } 30%,92% { opacity:1; transform:none; } 100% { opacity:0; transform:translateY(10px); } }
    @keyframes rowIn1 { 0%,27% { opacity:0; transform:translateY(10px); } 32%,92% { opacity:1; transform:none; } 100% { opacity:0; transform:translateY(10px); } }
    @keyframes rowIn2 { 0%,29% { opacity:0; transform:translateY(10px); } 34%,92% { opacity:1; transform:none; } 100% { opacity:0; transform:translateY(10px); } }
    @keyframes rowIn3 { 0%,31% { opacity:0; transform:translateY(10px); } 36%,92% { opacity:1; transform:none; } 100% { opacity:0; transform:translateY(10px); } }
    .r0 { animation: rowIn0 9s linear infinite; }
    .r1 { animation: rowIn1 9s linear infinite; }
    .r2 { animation: rowIn2 9s linear infinite; }
    .r3 { animation: rowIn3 9s linear infinite; }

    /* the whole list slides out left as the detail pushes in */
    .listGroup { animation-name: pushOut; }
    @keyframes pushOut {
      0%, 52%  { transform: translateX(0); opacity: 1; }
      60%      { transform: translateX(-70px); opacity: 0; }
      86%      { transform: translateX(-70px); opacity: 0; }
      93%,100% { transform: translateX(0); opacity: 1; }
    }

    /* a tap on the second row, just before the push */
    .ripple { animation-name: ripple; transform-origin: 164px 211px; }
    @keyframes ripple {
      0%, 45%  { opacity: 0; transform: scale(.2); }
      47%      { opacity: .55; transform: scale(.2); }
      53%      { opacity: 0; transform: scale(1.9); }
      100%     { opacity: 0; transform: scale(1.9); }
    }

    /* detail slides in from the right, iOS push style */
    .detail { animation-name: pushIn; }
    @keyframes pushIn {
      0%, 52%  { transform: translateX(240px); }
      60%      { transform: translateX(0); }
      86%      { transform: translateX(0); }
      93%,100% { transform: translateX(240px); }
    }

    /* bars grow once the detail has landed */
    .bar { animation-name: grow; }
    @keyframes grow {
      0%, 61%  { transform: scaleY(0); }
      70%      { transform: scaleY(1); }
      86%      { transform: scaleY(1); }
      90%,100% { transform: scaleY(0); }
    }
    .b0 { animation-delay: 0s; }
    .b1 { animation-delay: .07s; }
    .b2 { animation-delay: .14s; }
    .b3 { animation-delay: .21s; }
    .b4 { animation-delay: .28s; }

    .chip { animation: chipIn .6s cubic-bezier(.34,1.56,.64,1) backwards; }
    @keyframes chipIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .c0 { animation-delay: .5s; } .c1 { animation-delay: .6s; }
    .c2 { animation-delay: .7s; } .c3 { animation-delay: .8s; }

    .intro { animation: introIn .7s cubic-bezier(.22,.61,.36,1) backwards; }
    @keyframes introIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .i1 { animation-delay: .05s; } .i2 { animation-delay: .18s; } .i3 { animation-delay: .3s; }

    /* Motion is the whole point here, but it must not be the only way in:
       with motion reduced the phone settles on the loaded list. */
    @media (prefers-reduced-motion: reduce) {
      .splash, .skel, .ripple, .detail { display: none; }
      .row, .bar, .listGroup, .chip, .intro { animation: none; opacity: 1; transform: none; }
    }
  </style>

  <rect width="760" height="460" rx="16" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="759" height="459" rx="16" fill="none" stroke="#d1d9e0"/>

  <!-- phone -->
  <rect x="48" y="42" width="232" height="376" rx="34" fill="#eef1f6" stroke="#d1d9e0" stroke-width="1.5"/>
  <rect x="60" y="56" width="208" height="348" rx="20" fill="#ffffff"/>
  <rect x="138" y="62" width="52" height="6" rx="3" fill="#d1d9e0"/>

  <g clip-path="url(#screen)">
    <g class="listGroup">
      <text x="80" y="108" class="hdr">Shipped</text>
      
      <g class="skel s0">
        <rect x="72" y="130" width="184" height="46" rx="12" fill="#eef1f6"/>
        <rect x="80" y="137" width="32" height="32" rx="9" fill="#e6eaf0"/>
        <rect x="122" y="143" width="74" height="9" rx="4" fill="#e6eaf0"/>
        <rect x="122" y="158" width="46" height="8" rx="4" fill="#e6eaf0"/>
      </g>
      <g class="skel s1">
        <rect x="72" y="188" width="184" height="46" rx="12" fill="#eef1f6"/>
        <rect x="80" y="195" width="32" height="32" rx="9" fill="#e6eaf0"/>
        <rect x="122" y="201" width="74" height="9" rx="4" fill="#e6eaf0"/>
        <rect x="122" y="216" width="46" height="8" rx="4" fill="#e6eaf0"/>
      </g>
      <g class="skel s2">
        <rect x="72" y="246" width="184" height="46" rx="12" fill="#eef1f6"/>
        <rect x="80" y="253" width="32" height="32" rx="9" fill="#e6eaf0"/>
        <rect x="122" y="259" width="74" height="9" rx="4" fill="#e6eaf0"/>
        <rect x="122" y="274" width="46" height="8" rx="4" fill="#e6eaf0"/>
      </g>
      <g class="skel s3">
        <rect x="72" y="304" width="184" height="46" rx="12" fill="#eef1f6"/>
        <rect x="80" y="311" width="32" height="32" rx="9" fill="#e6eaf0"/>
        <rect x="122" y="317" width="74" height="9" rx="4" fill="#e6eaf0"/>
        <rect x="122" y="332" width="46" height="8" rx="4" fill="#e6eaf0"/>
      </g>
      
      <g class="row r0">
        <rect x="72" y="130" width="184" height="46" rx="12" fill="#eef1f6"/>
        <rect x="80" y="137" width="32" height="32" rx="9" fill="#3b82f6"/>
        <text x="122" y="151" class="rowName">Netevia</text>
        <text x="122" y="166" class="rowSub">banking</text>
      </g>
      <g class="row r1">
        <rect x="72" y="188" width="184" height="46" rx="12" fill="#eef1f6"/>
        <rect x="80" y="195" width="32" height="32" rx="9" fill="#8b5cf6"/>
        <text x="122" y="209" class="rowName">WorkAxle</text>
        <text x="122" y="224" class="rowSub">workforce</text>
      </g>
      <g class="row r2">
        <rect x="72" y="246" width="184" height="46" rx="12" fill="#eef1f6"/>
        <rect x="80" y="253" width="32" height="32" rx="9" fill="#f59e0b"/>
        <text x="122" y="267" class="rowName">Swish</text>
        <text x="122" y="282" class="rowSub">sports &amp; social</text>
      </g>
      <g class="row r3">
        <rect x="72" y="304" width="184" height="46" rx="12" fill="#eef1f6"/>
        <rect x="80" y="311" width="32" height="32" rx="9" fill="#10b981"/>
        <text x="122" y="325" class="rowName">DriveMe</text>
        <text x="122" y="340" class="rowSub">chauffeur</text>
      </g>
      <circle class="ripple" cx="164" cy="211" r="52" fill="#b8500f"/>
    </g>
    
    <g class="detail">
      <rect x="60" y="56" width="208" height="348" fill="#ffffff"/>
      <path d="M 86 92 L 80 97 L 86 102" stroke="#b8500f" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="94" y="102" class="backLink">Apps</text>
      <rect x="80" y="120" width="48" height="48" rx="13" fill="#8b5cf6"/>
      <text x="138" y="142" class="dTitle">WorkAxle</text>
      <text x="138" y="160" class="rowSub">live scheduling</text>
      <text x="80" y="202" class="rowSub">shifts this week</text>
      <rect class="bar b0" x="88" y="248" width="20" height="58" rx="5" fill="#b8500f" style="transform-origin:98px 306px"/><rect class="bar b1" x="122" y="214" width="20" height="92" rx="5" fill="#b8500f" style="transform-origin:132px 306px"/><rect class="bar b2" x="156" y="232" width="20" height="74" rx="5" fill="#b8500f" style="transform-origin:166px 306px"/><rect class="bar b3" x="190" y="190" width="20" height="116" rx="5" fill="#b8500f" style="transform-origin:200px 306px"/><rect class="bar b4" x="224" y="218" width="20" height="88" rx="5" fill="#b8500f" style="transform-origin:234px 306px"/>
      <rect x="80" y="330" width="168" height="40" rx="12" fill="#b8500f"/>
      <text x="164" y="355" class="cta" text-anchor="middle">Open shift board</text>
    </g>
    <g class="splash">
      <rect x="130" y="184" width="68" height="68" rx="19" fill="#b8500f"/>
      <text x="164" y="228" text-anchor="middle" font-size="34" font-weight="700" fill="#ffffff">K</text>
      <text x="164" y="278" text-anchor="middle" class="rowSub">loading...</text>
    </g>
  </g>

  <!-- right column -->
  <text x="330" y="120" class="name intro i1">Kamronbek Juraev</text>
  <text x="330" y="152" class="role intro i2">React Native / Expo engineer</text>
  <text x="330" y="198" class="blurb intro i3">7 years building mobile apps end-to-end —</text>
  <text x="330" y="222" class="blurb intro i3">architecture through App Store release.</text>
  <text x="330" y="258" class="blurb intro i3">20+ apps shipped. Banking, logistics,</text>
  <text x="330" y="282" class="blurb intro i3">enterprise scheduling, social.</text>
  
      <g class="chip c0">
        <rect x="330" y="300" width="140" height="32" rx="16" fill="#eef1f6" stroke="#d1d9e0"/>
        <text x="400" y="321" class="chipText" text-anchor="middle">React Native</text>
      </g>
      <g class="chip c1">
        <rect x="482" y="300" width="140" height="32" rx="16" fill="#eef1f6" stroke="#d1d9e0"/>
        <text x="552" y="321" class="chipText" text-anchor="middle">Expo</text>
      </g>
      <g class="chip c2">
        <rect x="330" y="344" width="140" height="32" rx="16" fill="#eef1f6" stroke="#d1d9e0"/>
        <text x="400" y="365" class="chipText" text-anchor="middle">TypeScript</text>
      </g>
      <g class="chip c3">
        <rect x="482" y="344" width="140" height="32" rx="16" fill="#eef1f6" stroke="#d1d9e0"/>
        <text x="552" y="365" class="chipText" text-anchor="middle">GraphQL</text>
      </g>
</svg>
